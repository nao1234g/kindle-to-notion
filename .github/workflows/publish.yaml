# .github/workflows/publish.yaml
# -----------------------------------------
name: Create and publish the Docker image

on:
  push:
    branches: [ master ]
  workflow_dispatch:  # 手動実行ボタンも一応残す

jobs:
  build-and-push-image:
    if: false          # ← ★ この 1 行で完全停止 ★
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Skip build
        run: echo "Docker build is disabled for this repository."
# -----------------------------------------
