# .github/workflows/sync.yml
# --------------------------------------------------
name: Sync Kindle highlights

on:
  # KindleHighlights.json または scripts 以下を push したら自動実行
  push:
    paths:
      - 'resources/KindleHighlights.json'
      - 'scripts/**'              # 変換スクリプトを更新したときも再実行
  # 手動トリガー
  workflow_dispatch:
  # 毎日 12:00 JST（03:00 UTC）に定期実行
  schedule:
    - cron: '0 3 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # ① リポジトリをチェックアウト
      - name: Checkout
        uses: actions/checkout@v3

      # ② 依存をインストール（devDependencies も含める）
      - name: Install dependencies
        run: npm install --include=dev

      # ③ Notion へ同期スクリプトを実行
      - name: Run sync script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: npm run sync
# --------------------------------------------------
